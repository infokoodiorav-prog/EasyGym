<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyGym</title>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">
          <img src="logo.png" alt="EasyGym Logo" />
        </div>
        <button
          class="burger"
          id="burgerBtn"
          aria-expanded="false"
          aria-controls="navMenu"
        >
          <div class="line"></div>
          <div class="line"></div>
          <div class="line"></div>
        </button>

        <nav class="nav-menu hidden" id="navMenu" aria-label="Main navigation">
          <a href="#">Home</a>
          <a href="#">About</a>
          <a href="#">Services</a>
          <a href="#">Contact</a>
        </nav>
      </div>
      <hr class="hr" />
      <div class="top-picker">
        <button id="prevBtn">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-arrow-left-icon lucide-arrow-left"
          >
            <path d="m12 19-7-7 7-7" />
            <path d="M19 12H5" />
          </svg>
        </button>

        <div class="date-stack">
          <button
            id="dateBtn"
            onclick="document.getElementById('dateInput').showPicker()"
          ></button>
          <p id="dayName"></p>
        </div>

        <button id="nextBtn">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-arrow-right-icon lucide-arrow-right"
          >
            <path d="M5 12h14" />
            <path d="m12 5 7 7-7 7" />
          </svg>
        </button>
        <input type="date" id="dateInput" style="display: none" />
      </div>

      <button id="addBtn">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-plus-icon lucide-plus"
        >
          <path d="M5 12h14" />
          <path d="M12 5v14" />
        </svg>
        <p>Lisa uus harjutus</p>
      </button>

      <div id="modal" class="modal hidden">
        <div class="modal-content">
          <h2>Uue harjutuse lisamine</h2>

          <input id="name" placeholder="Harjutuse nimi" />
          <div id="workoutNameWrap" class="modal-field">
            <input id="workoutName" placeholder="Jalad / Push / Pull" />
          </div>
          <input id="weight" type="number" placeholder="Raskus (kg)" />
          <input id="sets" type="number" placeholder="Mitu seeriat?" />
          <input id="reps" type="number" placeholder="Korduste arv" />

          <div class="modal-actions">
            <button id="saveBtn">Salvesta</button>
            <button id="closeBtn">Katkesta</button>
          </div>
        </div>
      </div>

      <div id="list"></div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="helpers.js"></script>
    <script src="storage.js"></script>
    <script src="date.js"></script>
    <script src="modal.js"></script>
    <script src="render.js"></script>
    <script src="app.js"></script>
  </body>
</html>
